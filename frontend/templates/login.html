<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Girişi | Yetki Doğrulaması</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="main-wrapper">
        <div class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh;">
            
            <nav class="cyber-nav" style="margin-bottom: 30px;">
                <a href="/" class="nav-btn neon-green">[ < ANA_SİSTEME_DÖN ]</a>
            </nav>

            <div class="cyber-post-card" style="width: 100%; max-width: 400px; padding: 40px; border-color: var(--neon-red); box-shadow: 0 0 30px rgba(255, 0, 85, 0.15);">
                <div class="login-header" style="text-align: center; margin-bottom: 30px;">
                    <h2 style="color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); margin: 0;">YETKİ DOĞRULAMASI</h2>
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 10px;">LÜTFEN ERİŞİM ANAHTARLARINIZI GİRİN_</p>
                </div>
                
                <form method="POST">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="color: var(--neon-green); font-size: 0.7rem; display: block; margin-bottom: 5px;">USER_ID :</label>
                        <input type="text" name="username" placeholder="Username" required 
                               style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--neon-green); border-radius: 5px; font-family: 'Fira Code', monospace; outline: none; box-sizing: border-box;">
                    </div>

                    <div class="form-group" style="margin-bottom: 30px;">
                        <label style="color: var(--neon-green); font-size: 0.7rem; display: block; margin-bottom: 5px;">PASSKEY :</label>
                        <input type="password" name="password" placeholder="••••••••" required 
                               style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--neon-green); border-radius: 5px; font-family: 'Fira Code', monospace; outline: none; box-sizing: border-box;">
                    </div>

                    <button type="submit" class="nav-btn neon-green" style="width: 100%; padding: 15px; cursor: pointer; background: transparent; font-size: 1rem;">
                        SİSTEME SIZ [ENTER]
                    </button>
                </form>

                <div style="margin-top: 25px; text-align: center; font-size: 0.6rem; color: #444;">
                    WARNING: UNAUTHORIZED ACCESS ATTEMPTS ARE LOGGED.
                </div>
            </div>

            <footer class="cyber-footer" style="margin-top: 40px;">
                <p style="color: #333;">// Developed and Created by Melisa kumral</p>
            </footer>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
