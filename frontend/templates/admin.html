{% extends "base.html" %}

{% block content %}
<div class="admin-container">
    <section class="welcome-hero" style="border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); margin-top: 30px;">
        <h2 style="color: var(--neon-blue); text-transform: uppercase;">ADMİN KOMUTA PANELİ</h2>
        <p style="color: var(--text-muted);">Yeni bir siber rapor hazırla ve sisteme enjekte et.</p>
    </section>

    <div class="cyber-post-card" style="margin-top: 30px; border-left: 4px solid var(--neon-green);">
        <form method="POST">
            <div class="form-group" style="margin-bottom: 25px;">
                <label style="color: var(--neon-green); display: block; margin-bottom: 10px; font-weight: bold;">[>] RAPOR BAŞLIĞI:</label>
                <input type="text" name="title" placeholder="Analiz Başlığı..." required 
                       style="width: 100%; padding: 15px; background: rgba(0,0,0,0.7); border: 1px solid #333; color: white; border-radius: 5px; font-family: 'Fira Code', monospace; box-sizing: border-box; outline: none;">
            </div>

            <div class="form-group" style="margin-bottom: 25px;">
                <label style="color: var(--neon-green); display: block; margin-bottom: 10px; font-weight: bold;">[>] RAPOR İÇERİĞİ:</label>
                <textarea name="content" rows="8" placeholder="Siber bulguları ve analiz detaylarını buraya girin..." required
                          style="width: 100%; padding: 15px; background: rgba(0,0,0,0.7); border: 1px solid #333; color: white; border-radius: 5px; font-family: 'Fira Code', monospace; box-sizing: border-box; outline: none; resize: vertical;"></textarea>
            </div>

            <button type="submit" class="nav-btn neon-green" style="width: 100%; padding: 18px; cursor: pointer; background: transparent; font-size: 1rem; letter-spacing: 2px;">
                RAPORU SİSTEME ENJEKTE ET [SEND_DATA]
            </button>
        </form>
    </div>
</div>
{% endblock %}
